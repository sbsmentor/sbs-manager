window.onerror = function() { return true; };
window.addEventListener('unhandledrejection', function(e) {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
  if (!msg || msg.toLowerCase().includes('script error') || msg.toLowerCase().includes('load fail')) {
    e.preventDefault();
  }
});
window.addEventListener('securitypolicyviolation', function(e){ e.preventDefault(); }, true);
</script>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;flex-shrink:0;}
.logo-text{font-weight:900;font-size:14px;letter-spacing:-.3px;}

.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* 로그인 상태 표시 */

.hdr-link-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;text-decoration:none;white-space:nowrap;cursor:pointer;font-family:'Noto Sans KR',sans-serif;background:none;transition:all .15s;}
.btn-timetable{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);display:none;}
.btn-timetable:hover{background:var(--blue);color:#fff;}
.btn-logout{border-color:var(--red);color:var(--red);background:var(--red-dim);display:none;}
.btn-logout:hover{background:var(--red);color:#fff;}
.admin-toggle{font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;transition:all .15s;}
.admin-toggle:hover{border-color:var(--accent);color:var(--accent);}
.admin-toggle.on{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}

/* 메인 */

.page-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}

.mentor-card-wrap:hover .mentor-del{display:flex;}
.add-card{background:none;border:2px dashed var(--border2);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;}

<!-- Firebase 멀티-CDN 로더 -->
<script>
(function() {
  const CDNS = [
    { app:'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js',
      db:'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js' },
    { app:'https://unpkg.com/firebase@10.12.0/firebase-app-compat.js',
      db:'https://unpkg.com/firebase@10.12.0/firebase-database-compat.js' },
    { app:'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
      db:'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js' }
  ];
  function loadScript(src){
    return new Promise((res)=>{ const s=document.createElement('script'); s.src=src; s.crossOrigin='anonymous'; s.onload=res; s.onerror=res; document.head.appendChild(s); });
  }
  async function tryLoad(i){
    if(i>=CDNS.length){ window._fbLoaded=false; return; }
    try{
      await loadScript(CDNS[i].app);
      await loadScript(CDNS[i].db);
      // SDK 객체가 제대로 로드됐는지 검증
      if(typeof firebase === 'undefined' || typeof firebase.database !== 'function'){
        throw new Error('firebase 객체 불완전');
      }
      window._fbLoaded=true;
    }catch(e){ tryLoad(i+1); }
  }
  window._fbLoaded=null;
  tryLoad(0);
})();
</script>

function fbSet(path, val){ _initFb(); return _db.ref(path).set(val); }
function fbGet(path){ _initFb(); return _db.ref(path).once('value'); }
function fbRemove(path){ _initFb(); return _db.ref(path).remove(); }
function fbOnValue(path, cb){ _initFb(); return _db.ref(path).on('value', cb); }
function fbPush(path, val){ _initFb(); return _db.ref(path).push(val); }

// ── 상태 ──

// ── 이모지 자동 세팅 ──
function autoSetEmoji(role){
  const map={'원장':'👑','부장':'🏆','수석':'💎','책임':'⭐','선임':'🌟','팀장':'🎯','멘토':'🌿'};
  const sel=document.getElementById('newEmoji');
  if(sel&&map[role]) for(let i=0;i<sel.options.length;i++) if(sel.options[i].value===map[role]){sel.selectedIndex=i;break;}

// ── 유틸 ──
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function getLoggedInId(){ return localStorage.getItem('sbs_logged_in'); }
function setAuthenticated(id){ localStorage.setItem('sbs_logged_in',id); }
function clearAuthenticated(){ localStorage.removeItem('sbs_logged_in'); }

// ── 로그인 UI ──
function updateLoginUI(){
  const id=getLoggedInId();
  const m=id?mentors.find(x=>x.id===id):null;
  const statusEl=document.getElementById('loginStatus');
  const logoutBtn=document.getElementById('logoutBtn');
  const ttBtn=document.getElementById('ttBtn');
  const loginBtn=document.getElementById('headerLoginBtn');
  if(m){
    statusEl.textContent=`${m.name} ${m.role||'멘토'}님`;
    statusEl.style.display='inline';
    logoutBtn.style.display='inline';
    if(loginBtn) loginBtn.style.display='none';
  } else {
    statusEl.style.display='none';
    logoutBtn.style.display='none';
    if(loginBtn) loginBtn.style.display='inline';
  }
  isAdmin = m && ['원장','부장'].includes(m.role);
  document.getElementById('adminToggle').textContent = isAdmin ? '⚙ 관리 ON' : '⚙ 관리';
}

function openLoginModal(title, sub){
  if(title){ const t=document.getElementById('loginModalTitle'); if(t) t.textContent=title; }
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').style.display='none';
  document.getElementById('loginModalBg').classList.add('open');
  setTimeout(()=>{
    const n=document.getElementById('loginName');
    if(n&&!n.readOnly&&!n.value) n.focus();
    else document.getElementById('loginPw').focus();
  }, 150);
}
function closeLoginModal(){
  document.getElementById('loginModalBg').classList.remove('open');
  _loginTarget=null; _loginForCardId=null; _loginForAdmin=false;
}
function doLogout(){
  clearAuthenticated(); updateLoginUI(); renderMentors();
  showToast('로그아웃되었습니다');
}

// ── 로그인 처리 ──
async function doLogin(){
  const nameVal=document.getElementById('loginName').value.trim();
  const pwVal=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  let target=_loginTarget;
  if(!target||target.name!==nameVal) target=mentors.find(m=>m.name===nameVal);
  if(!target){ errEl.textContent='❌ 이름을 찾을 수 없습니다.'; errEl.style.display='block'; return; }
  const snap=await fbGet(`mentorList/${target.id}/password`);
  const savedPw=snap.val()||'1234';
  if(pwVal!==savedPw){
    errEl.textContent='❌ 비밀번호가 올바르지 않습니다.'; errEl.style.display='block';
    document.getElementById('loginPw').value=''; document.getElementById('loginPw').focus(); return;
  }
  setAuthenticated(target.id);
  const welcomeRole=target.role||'멘토';
  closeLoginModal(); updateLoginUI(); renderMentors();
  showToast(`✅ ${target.name} ${welcomeRole}님 환영합니다!`);
  if(_loginForCardId){ const cid=_loginForCardId; _loginForCardId=null; goToManager(cid); }
}

async function doChangePw(){
  const id=getLoggedInId(); if(!id) return;
  const oldPw=document.getElementById('oldPwInput').value;
  const newPw=document.getElementById('newPwInput').value;
  const newPw2=document.getElementById('newPwInput2').value;
  const errEl=document.getElementById('changePwErr');
  errEl.style.display='none';
  if(newPw!==newPw2){ errEl.textContent='새 비밀번호가 일치하지 않습니다.'; errEl.style.display='block'; return; }
  if(newPw.length<4){ errEl.textContent='비밀번호는 4자리 이상이어야 합니다.'; errEl.style.display='block'; return; }
  const snap=await fbGet(`mentorList/${id}/password`);
  const savedPw=snap.val()||'1234';
  if(oldPw!==savedPw){ errEl.textContent='현재 비밀번호가 틀렸습니다.'; errEl.style.display='block'; return; }
  await fbSet(`mentorList/${id}/password`, newPw);
  document.getElementById('changePwModalBg').classList.remove('open');
  showToast('✅ 비밀번호가 변경되었습니다');
}
function closeChangePwModal(){ document.getElementById('changePwModalBg').classList.remove('open'); }
function openChangePwModal(){ document.getElementById('changePwModalBg').classList.add('open'); }

// ── 관리 토글 ──
function toggleAdmin(){
  const id=getLoggedInId();
  if(!id){ openLoginModal('관리자 로그인'); _loginForAdmin=true; return; }
  const m=mentors.find(x=>x.id===id);
  if(!m||!['원장','부장'].includes(m.role)){ showToast('⚠ 관리자 권한이 필요합니다'); return; }
  isAdmin=!isAdmin;
  document.getElementById('adminToggle').textContent=isAdmin?'⚙ 관리 ON':'⚙ 관리';
  renderMentors();
}

// ── 카드 클릭 ──
function handleCardClick(id){
  const loggedId=getLoggedInId();
  if(!loggedId){
    _loginForCardId=id;
    const m=mentors.find(x=>x.id===id);
    _loginTarget=m||null;
    const nameEl=document.getElementById('loginName');
    if(nameEl){ nameEl.value=m?m.name:''; nameEl.readOnly=!!m; nameEl.style.background=m?'#f8fafc':''; }
    openLoginModal('로그인');
    return;
  }
  const loggedM=mentors.find(x=>x.id===loggedId);
  if(loggedId===id||isSuperAdmin(loggedId)||(loggedM&&['원장','부장','팀장'].includes(loggedM.role))){
    goToManager(id); return;
  }
  _loginForCardId=id;
  const m=mentors.find(x=>x.id===id);
  _loginTarget=m||null;
  const nameEl=document.getElementById('loginName');
  if(nameEl){ nameEl.value=m?m.name:''; nameEl.readOnly=!!m; nameEl.style.background=m?'#f8fafc':''; }
  openLoginModal('로그인');
}
function goToManager(id){ window.location.href=`manager.html?id=${encodeURIComponent(id)}`; }

// ── 멘토 렌더링 ──
function renderMentors(){
  const container=document.getElementById('mentorGrid');
  const loggedId=getLoggedInId();
  const loggedM=loggedId?mentors.find(m=>m.id===loggedId):null;
  const teamColors={'1팀':'#e03050','2팀':'#5b4fff','3팀':'#2563eb','4팀':'#d97706','5팀':'#18a963','6팀':'#7c3aed','원장팀':'#1a1a2e'};
  const teamBgs={'1팀':'rgba(224,48,80,.08)','2팀':'rgba(91,79,255,.08)','3팀':'rgba(37,99,235,.08)','4팀':'rgba(217,119,6,.08)','5팀':'rgba(24,169,99,.08)','6팀':'rgba(124,58,237,.08)','원장팀':'rgba(26,26,46,.06)'};
  const teamOrder=['1팀','2팀','3팀','4팀','5팀','6팀','원장팀'];
  const groups={};
  mentors.forEach(m=>{ const t=m.team||'기타'; if(!groups[t]) groups[t]=[]; groups[t].push(m); });
  let html='';
  const renderTeam=(team)=>{
    const ms=groups[team]||[]; if(!ms.length) return;
    const tc=teamColors[team]||'#333', tb=teamBgs[team]||'rgba(0,0,0,.04)';
    html+=`<div class="team-section" style="border-left:3px solid ${tc};padding:12px 16px 16px;margin-bottom:16px;border-radius:0 8px 8px 0;background:${tb}">`;
    html+=`<div class="team-label" style="font-size:12px;font-weight:700;color:${tc};margin-bottom:10px;">● ${team} <span style="font-weight:400;opacity:.7">${ms.length}명</span></div>`;
    html+=`<div class="mentor-grid">`;
    ms.forEach(m=>{
      const isMe=loggedId===m.id;
      const ROLE_MAP={'부장':{color:'#7c3aed',bg:'#ede9fe',icon:'🏆'},'원장':{color:'#dc2626',bg:'#fee2e2',icon:'👑'},'수석':{color:'#0369a1',bg:'#e0f2fe',icon:'💎'},'책임':{color:'#0891b2',bg:'#cffafe',icon:'⭐'},'선임':{color:'#0d9488',bg:'#ccfbf1',icon:'🌟'},'팀장':{color:tc,bg:tb,icon:'🎯'},'멘토':{color:'#16a34a',bg:'#dcfce7',icon:'🌿'}};
      const rm=ROLE_MAP[m.role]||{color:'#64748b',bg:'#f1f5f9',icon:'👤'};
      const {color:roleColor,bg:roleBg,icon:roleIcon}=rm;
      const cardBorder=isMe?`border:2px solid ${tc};`:'';
      html+=`<div class="mentor-card-wrap">
        <div class="mentor-card" onclick="handleCardClick('${m.id}')" ontouchstart="_ttX=event.touches[0].clientX;_ttY=event.touches[0].clientY" ontouchend="if(Math.abs(event.changedTouches[0].clientX-_ttX)<10&&Math.abs(event.changedTouches[0].clientY-_ttY)<10){event.preventDefault();handleCardClick('${m.id}')}" style="${cardBorder}${isMe?'background:'+tb+';':''}">
          <div class="mentor-avatar" style="background:${tb};font-size:32px;margin:0 auto 8px auto;">${m.emoji||'🌿'}</div>
          <div class="mentor-name" style="font-size:16px;font-weight:800;margin-top:6px;">${m.name} ${isMe?`<span style="font-size:11px;color:${tc};">● 나</span>`:''}</div>
          <div style="margin-top:5px;">
            <span style="display:inline-flex;align-items:center;gap:3px;color:${roleColor};font-size:12px;font-weight:800;background:${roleBg};padding:4px 10px;border-radius:20px;">${roleIcon} ${m.role||'멘토'}</span>
            ${isSuperAdmin(loggedId)||loggedId==='이기건'?`<button onclick="event.stopPropagation();openRoleEdit('${m.id}')" ontouchend="event.stopPropagation();event.preventDefault();openRoleEdit('${m.id}')" style="margin-left:4px;padding:3px 7px;font-size:10px;border:1px solid #cbd5e1;border-radius:12px;background:#f8fafc;color:#64748b;cursor:pointer;">✏️</button>`:''}
          </div>
        </div>
        ${isAdmin?`<button class="mentor-del-btn" onclick="deleteMentor('${m.id}')">✕</button>`:''}
      </div>`;
    });
    html+=`</div>`;
    if(isAdmin) html+=`<div class="add-card" onclick="openAddModal('${team}')"><div class="add-card-icon">➕</div><div class="add-card-label">${team} 추가</div></div>`;
    html+=`</div>`;
  };
  teamOrder.forEach(renderTeam);
  Object.keys(groups).filter(t=>!teamOrder.includes(t)).forEach(renderTeam);
  container.innerHTML=html;
}

// ── 멘토 로드 ──
function loadMentors(){
  fbOnValue('mentorList', snap=>{
    const data=snap.val();
    const ROLE_ORDER2={'멘토':0,'선임':1,'책임':2,'수석':3,'팀장':4,'부장':5,'원장':6};
    mentors=data?Object.values(data).sort((a,b)=>{
      const ro=(ROLE_ORDER2[b.role]??-1)-(ROLE_ORDER2[a.role]??-1);
      if(ro!==0) return ro;
      return (a.order??99)-(b.order??99);
    }):[];
    updateLoginUI(); renderMentors();
  });
}

// ── 멘토 추가/삭제 ──
function openAddModal(team){
  document.getElementById('newName').value='';
  const teamSel=document.getElementById('newTeam');
  if(teamSel&&team) teamSel.value=team;
  document.getElementById('addModalBg').classList.add('open');
  setTimeout(()=>document.getElementById('newName').focus(),100);
}
function closeAddModal(){ document.getElementById('addModalBg').classList.remove('open'); }

window.addMentor = async function(){
  const name=document.getElementById('newName').value.trim();
  const roleSel=document.getElementById('newRole'); const role=roleSel?roleSel.value:'멘토';
  const emoji=document.getElementById('newEmoji').value;
  const teamEl=document.getElementById('newTeam'); const team=teamEl?teamEl.value:'기타';
  if(!name){ showToast('⚠ 이름을 입력하세요'); return; }
  if(mentors.find(m=>m.name===name)){ showToast('⚠ 이미 존재하는 이름입니다'); return; }
  const maxOrder=mentors.length>0?Math.max(...mentors.map(m=>m.order||0))+1:1;
  const mentor={id:name,name,role,emoji,team,order:maxOrder};
  await fbSet(`mentorList/${name}`,mentor);
  closeAddModal(); showToast(`✅ ${name} 멘토가 추가되었습니다`);
};

window.deleteMentor = async function(id){
  const m=mentors.find(x=>x.id===id); if(!m) return;
  if(!confirm(`"${m.name}" 멘토를 삭제하시겠습니까?`)) return;
  await fbRemove(`mentorList/${id}`);
  await fbRemove(`mentors/${id}`);
  showToast(`✅ ${m.name} 삭제 완료`);
};

// ── 직책 수정 ──
let _roleEditId=null;
function openRoleEdit(mentorId){
  _roleEditId=mentorId;
  const m=mentors.find(x=>x.id===mentorId); if(!m) return;
  const sel=document.getElementById('roleEditSelect');
  const opts=['원장','부장','수석','책임','선임','팀장','멘토'];
  if(opts.includes(m.role)) sel.value=m.role;
  else { sel.value='멘토'; document.getElementById('roleEditCustom').value=m.role||''; }
  document.getElementById('roleEditModalBg').classList.add('open');
}
function closeRoleEdit(){ document.getElementById('roleEditModalBg').classList.remove('open'); _roleEditId=null; }
async function saveRoleEdit(){
  if(!_roleEditId) return;
  const custom=document.getElementById('roleEditCustom').value.trim();
  const sel=document.getElementById('roleEditSelect').value;
  const newRole=custom||sel;
  const emojiMap={'원장':'👑','부장':'🏆','수석':'💎','책임':'⭐','선임':'🌟','팀장':'🎯','멘토':'🌿'};
  await fbSet(`mentorList/${_roleEditId}/role`,newRole);
  if(emojiMap[newRole]) await fbSet(`mentorList/${_roleEditId}/emoji`,emojiMap[newRole]);
  const m=mentors.find(x=>x.id===_roleEditId);
  if(m){ m.role=newRole; if(emojiMap[newRole]) m.emoji=emojiMap[newRole]; }
  closeRoleEdit(); renderMentors();
  showToast(`✅ ${_roleEditId} 직책 변경: ${newRole}`);
}

async function seedMentors(){
  try {
    const snap=await fbGet('mentorList');
    const existing=snap.val()||{};
    if(Object.keys(existing).length>0){
      // 삭제된 멘토 복구 안함, role/emoji만 동기화
      for(const [id,mentor] of Object.entries(INITIAL_MENTORS)){
        if(!existing[id]) continue;
        if(existing[id].role!==mentor.role) await fbSet(`mentorList/${id}/role`,mentor.role);
        if(existing[id].emoji!==mentor.emoji) await fbSet(`mentorList/${id}/emoji`,mentor.emoji);
      }
      return;
    }
    for(const [id,mentor] of Object.entries(INITIAL_MENTORS)) await fbSet(`mentorList/${id}`,mentor);
  } catch(e) {}
}
