<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#f5f5f8;--surface:#fff;--surface2:#f0f0f5;--surface3:#e8e8f0;
  --border:#e0e0ea;--border2:#d0d0e0;
  --accent:#5b4fff;--accent-dim:rgba(91,79,255,.08);
  --green:#18a963;--green-dim:rgba(24,169,99,.08);
  --red:#e03050;--red-dim:rgba(224,48,80,.08);
  --orange:#d97706;--orange-dim:rgba(217,119,6,.08);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.08);
  --text:#1a1a2e;--text2:#6b6b8a;--text3:#a0a0bc;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;flex-shrink:0;}
.logo-text{font-weight:900;font-size:14px;letter-spacing:-.3px;}
.logo-text span{color:var(--accent);}
.header-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* 로그인 상태 표시 */
.login-status{font-size:12px;font-weight:700;color:var(--accent);font-family:var(--mono);display:none;}
.hdr-link-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;text-decoration:none;white-space:nowrap;cursor:pointer;font-family:'Noto Sans KR',sans-serif;background:none;transition:all .15s;}
.btn-timetable{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);display:none;}
.btn-timetable:hover{background:var(--blue);color:#fff;}
.btn-logout{border-color:var(--red);color:var(--red);background:var(--red-dim);display:none;}
.btn-logout:hover{background:var(--red);color:#fff;}
.admin-toggle{font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;transition:all .15s;}
.admin-toggle:hover{border-color:var(--accent);color:var(--accent);}
.admin-toggle.on{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}

/* 메인 */
.main{flex:1;padding:32px 24px;}
.page-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}

/* 강사 카드 그리드 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:28px;}
.mentor-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;text-decoration:none;display:block;}
.mentor-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(91,79,255,.12);transform:translateY(-2px);}
.mentor-avatar{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;}
.mentor-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.mentor-role{font-size:11px;font-family:var(--mono);}
.mentor-count{margin-top:8px;font-size:11px;color:var(--text2);font-family:var(--mono);}
.mentor-count span{font-weight:700;}
.mentor-card-wrap{position:relative;}
.mentor-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border:none;background:var(--red-dim);color:var(--red);border-radius:5px;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;}
.mentor-card-wrap:hover .mentor-del{display:flex;}
.add-card{background:none;border:2px dashed var(--border2);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;}
.add-card:hover{border-color:var(--accent);background:var(--accent-dim);}
.add-card-icon{font-size:22px;}
.add-card-text{font-size:12px;font-weight:700;color:var(--text2);}
.add-card:hover .add-card-text{color:var(--accent);}

/* 섹션 타이틀 */
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:10px;}

/* 로딩 */
.loading{flex:1;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:90%;max-width:400px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h3{font-size:17px;font-weight:800;margin-bottom:18px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:var(--surface2);transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff;}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-save{flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-save:hover{opacity:.88;}

/* 로그인 모달 */
.login-modal{max-width:360px;}
.login-title-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.login-subtitle{font-size:12px;color:var(--text2);margin-bottom:20px;}
.login-sep{height:1px;background:var(--border);margin:14px 0;}
.err-msg{font-size:12px;color:var(--red);margin-top:-8px;margin-bottom:8px;display:none;}

    grid-template-columns: repeat(1, 1fr) !important;
  }
}

<!-- Firebase 멀티-CDN 로더 -->
<script>
(function() {
  const CDNS = [
    { app:'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js',
      db:'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.min.js' },
    { app:'https://unpkg.com/firebase@10.12.0/firebase-app-compat.js',
      db:'https://unpkg.com/firebase@10.12.0/firebase-database-compat.js' },
    { app:'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
      db:'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js' }
  ];
  function loadScript(src){
    return new Promise((res)=>{ const s=document.createElement('script'); s.src=src; s.crossOrigin='anonymous'; s.onload=res; s.onerror=res; document.head.appendChild(s); });
  }
  async function tryLoad(i){
    if(i>=CDNS.length){ window._fbLoaded=false; return; }
    try{
      await loadScript(CDNS[i].app);
      await loadScript(CDNS[i].db);
      // SDK 객체가 제대로 로드됐는지 검증
      if(typeof firebase === 'undefined' || typeof firebase.database !== 'function'){
        throw new Error('firebase 객체 불완전');
      }
      window._fbLoaded=true;
    }catch(e){ tryLoad(i+1); }
  }
  window._fbLoaded=null;
  tryLoad(0);
})();
</script>

<script>
// ═══════════════════════════════════════════
// Firebase 설정
// ═══════════════════════════════════════════
const FB_CONFIG = {
  apiKey: "AIzaSyCyCtQu20qgyCT1uRvmH3bmT1Q1bsT_pUw",
  authDomain: "sbs-academy-game.firebaseapp.com",
  databaseURL: "https://sbs-academy-game-default-rtdb.firebaseio.com",
  projectId: "sbs-academy-game",
  storageBucket: "sbs-academy-game.firebasestorage.app",
  messagingSenderId: "120735998268",
  appId: "1:120735998268:web:9d0d5c778451f69d63fe39"
};

// Firebase 인스턴스 (init 후 사용)
let _db = null;
function fbRef(path){ return _db.ref(path); }
function fbGet(path){ return _db.ref(path).once('value'); }
function fbSet(path, val){ return _db.ref(path).set(val); }
function fbRemove(path){ return _db.ref(path).remove(); }
function fbPush(path, val){ return _db.ref(path).push(val); }
function fbOnValue(path, cb){ return _db.ref(path).on('value', cb); }

// ═══════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════
let mentors = [];
let isAdmin = false;
let _loginTarget = null; // { id, name, role } — 로그인 진행 중인 멘토
let _loginForAdmin = false;
let _loginForCardId = null; // 카드 클릭으로 로그인 시 목적지

// ═══════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function getLoggedInId(){ return sessionStorage.getItem('sbsLoggedIn')||null; }
function getLoggedInMentor(){ const id=getLoggedInId(); return id?mentors.find(m=>m.id===id):null; }

function isAuthenticated(id){
  const auth=JSON.parse(sessionStorage.getItem('sbsAuth')||'{}');
  return !!auth[id];
}
function setAuthenticated(id){
  const auth=JSON.parse(sessionStorage.getItem('sbsAuth')||'{}');
  auth[id]=true;
  sessionStorage.setItem('sbsAuth',JSON.stringify(auth));
  sessionStorage.setItem('sbsLoggedIn',id);
}

// ═══════════════════════════════════════════
// 로그인 상태 UI 업데이트
// ═══════════════════════════════════════════
function updateLoginUI(){
  const id = getLoggedInId();
  const m  = id ? mentors.find(x=>x.id===id) : null;
  const statusEl  = document.getElementById('loginStatus');
  const logoutBtn = document.getElementById('logoutBtn');
  const ttBtn     = document.getElementById('ttBtn');
  const subText   = document.getElementById('pageSubText');

  const loginBtn = document.getElementById('headerLoginBtn');
  if(m){
    statusEl.textContent = `${m.name} ${m.role||'멘토'}님`;
    statusEl.style.display = 'inline';
    logoutBtn.style.display = 'inline';
    if(loginBtn) loginBtn.style.display = 'none';
    // 팀장/부장/원장이면 시간표 버튼
    if(['팀장','부장','원장'].includes(m.role)) ttBtn.style.display='inline';
    else ttBtn.style.display='none';
    if(subText) subText.textContent='본인 이름 카드를 클릭하면 수강생 관리 페이지로 이동합니다.';
  } else {
    statusEl.style.display='none';
    logoutBtn.style.display='none';
    if(loginBtn) loginBtn.style.display = 'inline';
    ttBtn.style.display='none';
    if(subText) subText.textContent='이름 카드를 클릭하면 비밀번호 입력 후 수강생 관리 페이지로 이동합니다.';
  }
}

// ═══════════════════════════════════════════
// 로그아웃
// ═══════════════════════════════════════════
function doLogout(){
  if(!confirm('로그아웃 하시겠습니까?')) return;
  const name = getLoggedInMentor()?.name || '';
  sessionStorage.removeItem('sbsLoggedIn');
  sessionStorage.removeItem('sbsAuth');
  isAdmin=false;
  document.getElementById('adminToggle').classList.remove('on');
  document.getElementById('adminToggle').textContent='⚙ 관리';
  updateLoginUI();
  renderMentors();
  showToast(`👋 ${name}님 로그아웃되었습니다`);
}

// ═══════════════════════════════════════════
// 카드 렌더
// ═══════════════════════════════════════════
function renderMentors(){
  const container = document.getElementById('mentorGrid');
  const loggedId  = getLoggedInId();
  const loggedM   = loggedId ? mentors.find(m=>m.id===loggedId) : null;
  const isSuperRole = loggedM && ['부장','팀장','원장'].includes(loggedM.role);

  const teamColors={
    '1팀':'#e03050','2팀':'#5b4fff','3팀':'#2563eb',
    '4팀':'#d97706','5팀':'#18a963','6팀':'#7c3aed','원장팀':'#1a1a2e'
  };
  const teamBgs={
    '1팀':'rgba(224,48,80,.08)','2팀':'rgba(91,79,255,.08)','3팀':'rgba(37,99,235,.08)',
    '4팀':'rgba(217,119,6,.08)','5팀':'rgba(24,169,99,.08)','6팀':'rgba(124,58,237,.08)','원장팀':'rgba(26,26,46,.06)'
  };
  const teamOrder=['1팀','2팀','3팀','4팀','5팀','6팀','원장팀'];

  const groups={};
  mentors.forEach(m=>{ const t=m.team||'기타'; if(!groups[t]) groups[t]=[]; groups[t].push(m); });

  let html='';
  teamOrder.forEach(teamName=>{
    const members=groups[teamName];
    if(!members||!members.length) return;
    const tc=teamColors[teamName]||'#18a963';
    const tb=teamBgs[teamName]||'rgba(24,169,99,.08)';

    html+=`<div style="margin-bottom:22px;">
      <div style="font-size:11px;font-weight:800;color:${tc};letter-spacing:1px;font-family:var(--mono);margin-bottom:8px;display:flex;align-items:center;gap:7px;">
        <span style="width:9px;height:9px;border-radius:50%;background:${tc};display:inline-block;"></span>
        ${teamName} <span style="font-weight:400;color:var(--text3);font-size:11px;">${members.length}명</span>
      </div>
      <div class="card-grid" style="margin-bottom:0;">`;

    members.forEach(m=>{
      const roleColor=m.role==='팀장'?tc:'#18a963';
      const roleBg=m.role==='팀장'?tb:'rgba(24,169,99,.08)';
      const isMe = loggedId===m.id;
      const cardBorder = isMe ? `border-top:3px solid ${tc};outline:2px solid ${tc}40;` : `border-top:3px solid ${tc};`;

      html+=`<div class="mentor-card-wrap">
        <div class="mentor-card" onclick="handleCardClick('${m.id}')" style="${cardBorder}${isMe?'background:'+tb+';':''}">
          <div class="mentor-avatar" style="background:${tb};">${m.emoji||'👨‍🏫'}</div>
          <div class="mentor-name">${m.name} ${isMe?'<span style="font-size:10px;color:'+tc+';font-family:var(--mono);">● 나</span>':''}</div>
          <div class="mentor-role" style="color:${roleColor};font-weight:700;background:${roleBg};display:inline-block;padding:2px 7px;border-radius:4px;margin-top:2px;">${m.role||'멘토'}</div>
          <div class="mentor-count">수강생 <span id="cnt-${m.id}" style="color:${tc};">-</span>명</div>
        </div>
        ${isAdmin?`<button class="mentor-del" onclick="event.stopPropagation();deleteMentor('${m.id}')">✕</button>`:''}
      </div>`;
    });

    if(isAdmin){
      html+=`<div class="add-card" onclick="openAddModal()">
        <div class="add-card-icon">➕</div>
        <div class="add-card-text">${teamName} 추가</div>
      </div>`;
    }
    html+=`</div></div>`;
  });

  container.innerHTML = html;

  // 수강생 수 로드
  // Firebase는 배열을 {0:item, 1:item} 형태의 객체로 저장하므로 Object.values()로 처리
  mentors.forEach(m=>{
    fbOnValue(`mentors/${m.id}/data`, snap=>{
      const d=snap.val();
      let cnt=0;
      if(d){
        // Firebase는 배열을 {0:item,1:item} 객체로 저장
        // 수강생은 이름(이름)이 있는 항목만 카운트
        const countArr = (arr)=>{
          if(!arr) return 0;
          // 숫자 키 객체({0:...,1:...}) 또는 배열 모두 처리
          const vals = Array.isArray(arr)
            ? arr
            : Object.values(arr);
          return vals.filter(v=>{
            if(!v || typeof v!=='object') return false;
            // 이름 또는 연락처가 있는 실제 수강생만 카운트
            // 이름이 실제 문자열이고 비어있지 않아야 함
          const name = v['이름'] || v['name'] || '';
          return typeof name==='string' && name.trim().length > 0;
          }).length;
        };
        // _v 같은 메타 필드 제외, 실제 배열 키만
        const WEEKDAY = d.WEEKDAY || d.weekday || null;
        const WEEKEND = d.WEEKEND || d.weekend || null;
        const COD = d.COD_DATA || null;
        const NATL = d.NATL_DATA || null;
        cnt = countArr(WEEKDAY)+countArr(WEEKEND)+countArr(COD)+countArr(NATL);
      }
      const el=document.getElementById(`cnt-${m.id}`);
      if(el) el.textContent=cnt;
    });
  });
}

// ═══════════════════════════════════════════
// 카드 클릭 핸들러
// ═══════════════════════════════════════════
function handleCardClick(id){
  const loggedId = getLoggedInId();

  // 이미 내가 로그인된 경우 → 바로 이동
  if(loggedId && isAuthenticated(loggedId)){
    const loggedM = mentors.find(m=>m.id===loggedId);
    // 슈퍼롤이면 다른 카드도 바로 이동
    if(loggedId===id || (loggedM && ['부장','팀장','원장'].includes(loggedM.role))){
      location.href=`manager.html?mentor=${encodeURIComponent(id)}`;
      return;
    }
  }

  // 로그인 필요 → 로그인 모달
  const m = mentors.find(x=>x.id===id);
  _loginTarget = m || { id };
  _loginForCardId = id;
  _loginForAdmin = false;
  openLoginModal(`${m?.name||''} 계정으로 로그인`, '비밀번호를 입력하면 수강생 관리 페이지로 이동합니다.');
  // 이름 자동 입력
  const nameEl=document.getElementById('loginName');
  if(nameEl){ nameEl.value=m?.name||''; nameEl.readOnly=true; nameEl.style.background='var(--surface2)'; }
}

// ═══════════════════════════════════════════
// 로그인 모달
// ═══════════════════════════════════════════
function openLoginModal(title, sub){
  document.getElementById('loginModalTitle').textContent = title||'로그인';
  document.getElementById('loginModalSub').textContent   = sub||'';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').style.display='none';
  openLoginModal();
}
function closeLoginModal(){
  document.getElementById('loginModalBg').classList.remove('open');
  _loginTarget=null; _loginForCardId=null; _loginForAdmin=false;
  const nameEl=document.getElementById('loginName');
  if(nameEl){ nameEl.value=''; nameEl.readOnly=false; nameEl.style.background=''; }
}

// 이름 입력 시 자동으로 mentors에서 찾기
function loginNameInput(el){
  const v = el.value.trim();
  const m = mentors.find(x=>x.name===v);
  _loginTarget = m || null;
}

async function doLogin(){
  const nameVal = document.getElementById('loginName').value.trim();
  const pwVal   = document.getElementById('loginPw').value;
  const errEl   = document.getElementById('loginErr');
  errEl.style.display='none';

  // 대상 결정
  let target = _loginTarget;
  if(!target || target.name !== nameVal){
    target = mentors.find(m=>m.name===nameVal);
  }
  if(!target){
    errEl.textContent='❌ 이름을 찾을 수 없습니다.'; errEl.style.display='block'; return;
  }

  // 비밀번호 확인
  const snap = await fbGet(`mentors/${target.id}/password`);
  const savedPw = snap.val() || '1234';

  if(pwVal !== savedPw){
    errEl.textContent='❌ 비밀번호가 올바르지 않습니다.'; errEl.style.display='block';
    document.getElementById('loginPw').value=''; document.getElementById('loginPw').focus();
    return;
  }

  // 로그인 성공
  setAuthenticated(target.id);
  closeLoginModal();
  updateLoginUI();
  renderMentors();
  showToast(`✅ ${target.name}님 로그인 완료!`);

  if(_loginForAdmin){
    isAdmin=true;
    document.getElementById('adminToggle').classList.add('on');
    document.getElementById('adminToggle').textContent='⚙ 관리 ON';
    renderMentors();
    _loginForAdmin=false;
    return;
  }

  // 카드 클릭으로 온 경우 → 해당 페이지 이동
  if(_loginForCardId){
    const dest = _loginForCardId;
    _loginForCardId=null;
    location.href=`manager.html?mentor=${encodeURIComponent(dest)}`;
  }
}

// ═══════════════════════════════════════════
// 비밀번호 변경
// ═══════════════════════════════════════════
function showChangePwFromLogin(){
  document.getElementById('loginModalBg').classList.remove('open');
  document.getElementById('oldPwInput').value='';
  document.getElementById('newPwInput').value='';
  document.getElementById('newPwInput2').value='';
  document.getElementById('changePwErr').style.display='none';
  document.getElementById('changePwModalBg').classList.add('open');
  setTimeout(()=>document.getElementById('oldPwInput').focus(),100);
}
function closeChangePwModal(){
  document.getElementById('changePwModalBg').classList.remove('open');
  if(_loginTarget) document.getElementById('loginModalBg').classList.add('open');
}
async function doChangePw(){
  const errEl=document.getElementById('changePwErr');
  errEl.style.display='none';
  const target=_loginTarget;
  if(!target){ errEl.textContent='❌ 로그인 대상을 알 수 없습니다.'; errEl.style.display='block'; return; }
  const oldPw=document.getElementById('oldPwInput').value;
  const newPw=document.getElementById('newPwInput').value;
  const newPw2=document.getElementById('newPwInput2').value;
  const snap=await fbGet(`mentors/${target.id}/password`);
  const savedPw=snap.val()||'1234';
  if(oldPw!==savedPw){ errEl.textContent='❌ 현재 비밀번호가 틀렸습니다.'; errEl.style.display='block'; return; }
  if(newPw.length<4){ errEl.textContent='❌ 새 비밀번호는 4자리 이상이어야 합니다.'; errEl.style.display='block'; return; }
  if(newPw!==newPw2){ errEl.textContent='❌ 새 비밀번호가 일치하지 않습니다.'; errEl.style.display='block'; return; }
  await fbSet(`mentors/${target.id}/password`, newPw);
  closeChangePwModal();
  showToast('✅ 비밀번호가 변경되었습니다!');
}

// ═══════════════════════════════════════════
// 관리자 모드
// ═══════════════════════════════════════════
function toggleAdmin(){
  if(!isAdmin){
    const loggedId=getLoggedInId();
    if(loggedId && isAuthenticated(loggedId)){
      const m=mentors.find(x=>x.id===loggedId);
      if(m && ['팀장','부장','원장'].includes(m.role)){
        isAdmin=true;
        document.getElementById('adminToggle').classList.add('on');
        document.getElementById('adminToggle').textContent='⚙ 관리 ON';
        renderMentors(); return;
      }
    }
    // 관리자 로그인 필요
    _loginForAdmin=true;
    _loginTarget=null; _loginForCardId=null;
    const nameEl=document.getElementById('loginName');
    if(nameEl){ nameEl.value=''; nameEl.readOnly=false; nameEl.style.background=''; }
    openLoginModal('⚙ 관리자 로그인','팀장/부장 계정으로 로그인하세요.');
  } else {
    isAdmin=false;
    document.getElementById('adminToggle').classList.remove('on');
    document.getElementById('adminToggle').textContent='⚙ 관리';
    renderMentors();
  }
}

// ═══════════════════════════════════════════
window.openAddModal = function(team){
  document.getElementById('addModalBg').classList.add('open');
  setTimeout(()=>document.getElementById('newName').focus(),100);
};
window.closeAddModal = function(){
  document.getElementById('addModalBg').classList.remove('open');
  document.getElementById('newName').value='';
  document.getElementById('newRole').value='';
};
window.addMentor = async function(){
  const name=document.getElementById('newName').value.trim();
  const role=document.getElementById('newRole').value.trim();
  const emoji=document.getElementById('newEmoji').value;
  if(!name){ showToast('⚠ 이름을 입력하세요'); return; }
  const id=name.replace(/[^가-힣a-zA-Z0-9]/g,'_')+'_'+Date.now();
  const mentor={id,name,role:role||'멘토',emoji,team:'기타',order:999};
  await fbSet(`mentorList/${id}`,mentor);
  closeAddModal();
  showToast(`✅ ${name} 멘토가 추가되었습니다`);
};
window.deleteMentor = async function(id){
  const m=mentors.find(x=>x.id===id);
  if(!confirm(`"${m?.name}" 강사를 삭제하시겠습니까?\n수강생 데이터도 모두 삭제됩니다!`)) return;
  await fbRemove(`mentorList/${id}`);
  await fbRemove(`mentors/${id}`);
  showToast('삭제되었습니다');
};

// ═══════════════════════════════════════════
// 멘토 목록 로드 (실시간)
// ═══════════════════════════════════════════
function loadMentors(){
  fbOnValue('mentorList', snap=>{
    const data=snap.val();
    mentors=data ? Object.values(data).sort((a,b)=>(a.order??99)-(b.order??99)) : [];
    updateLoginUI();
    renderMentors();
  });
}

async function seedMentors(){
  // 기존 멘토 유지하면서 새 멘토만 추가
  try {
    const snap = await fbGet('mentorList');
    const existing = snap.val() || {};
    for(const [id,mentor] of Object.entries(INITIAL_MENTORS)){
      if(!existing[id]){
        await fbSet(`mentorList/${id}`, mentor);
      }
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
async function init(){
  // Firebase SDK 로드 대기 (최대 10초)
  await new Promise(resolve=>{
    let t=0;
    const iv=setInterval(()=>{
      if(window._fbLoaded===true||window._fbLoaded===false){ clearInterval(iv); resolve(); }
      if((t+=100)>=10000){ clearInterval(iv); resolve(); }
    },100);
  });

  if(window._fbLoaded===true){
    try {
      const fbApp = (firebase.apps && firebase.apps.length)
        ? firebase.apps[0]
        : firebase.initializeApp(FB_CONFIG);
      _db = firebase.database(fbApp);
    } catch(e) {
      window._fbLoaded = false;
    }
  }
  if(window._fbLoaded!==true){
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    document.getElementById('mentorGrid').innerHTML=
      '<div style="padding:48px;text-align:center;color:var(--red);"><div style="font-size:40px;margin-bottom:12px;">⚠️</div><div style="font-size:15px;font-weight:700;">Firebase 연결 실패</div><div style="font-size:12px;color:var(--text2);margin-top:6px;">인터넷 연결을 확인하고 새로고침해주세요.</div></div>';
    return;
  }

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';

  await seedMentors();
  loadMentors();
}

init();
