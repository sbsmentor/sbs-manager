<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간표 관리 | SBS아카데미게임학원</title>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#f5f5f8;--surface:#fff;--surface2:#f0f0f5;--surface3:#e8e8f0;
  --border:#e0e0ea;--border2:#d0d0e0;
  --accent:#5b4fff;--accent-dim:rgba(91,79,255,.08);
  --green:#18a963;--green-dim:rgba(24,169,99,.08);
  --red:#e03050;--red-dim:rgba(224,48,80,.08);
  --orange:#d97706;--orange-dim:rgba(217,119,6,.08);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.08);
  --text:#1a1a2e;--text2:#6b6b8a;--text3:#a0a0bc;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
.logo{font-weight:900;font-size:14px;color:var(--accent);}
.back-btn{font-size:12px;color:var(--text2);text-decoration:none;font-family:var(--mono);padding:4px 10px;border:1px solid var(--border);border-radius:6px;white-space:nowrap;transition:all .15s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}

.content{padding:20px 24px;max-width:1400px;margin:0 auto;}

/* 탭 */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab-btn{padding:10px 20px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}

/* 업로드 영역 */
.upload-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
.upload-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.upload-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.upload-label{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px dashed var(--accent);color:var(--accent);background:var(--accent-dim);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.upload-label:hover{background:var(--accent);color:#fff;}
.upload-info{font-size:11px;color:var(--text3);}

/* 검색/필터 */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.search-inp{flex:1;min-width:200px;max-width:320px;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:var(--surface2);}
.search-inp:focus{border-color:var(--accent);background:#fff;}
.filter-sel{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;background:var(--surface2);cursor:pointer;}
.count-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--accent);color:var(--accent);background:var(--accent-dim);}

/* 테이블 */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--surface);}
table{width:100%;border-collapse:collapse;min-width:800px;}
thead th{background:#f8f8fc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);text-transform:uppercase;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.month-header-row:hover td{filter:brightness(0.97);}
.course-row td{background:#fff;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:8px 12px;vertical-align:middle;font-size:12px;}

/* 인라인 편집 */
.editable{cursor:pointer;border-bottom:1px dashed transparent;transition:all .1s;}
.editable:hover{border-bottom-color:var(--accent);color:var(--accent);}
.edit-inp{border:1px solid var(--accent);border-radius:4px;padding:2px 6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}

/* 뱃지 */
.type-badge{display:inline-block;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:4px;}
.t-weekday{background:var(--blue-dim);color:var(--blue);}
.t-weekend{background:var(--orange-dim);color:var(--orange);}

/* 삭제 버튼 */
.del-btn{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--red);color:var(--red);background:var(--red-dim);cursor:pointer;white-space:nowrap;transition:all .1s;}
.del-btn:hover{background:var(--red);color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 빈 상태 */
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;}

/* 로딩 */
#loadingBar{display:none;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:2px;margin-bottom:12px;animation:loading 1s ease infinite;}
@keyframes loading{0%{width:0%}100%{width:100%}}

/* 모바일 최적화 */
@media (max-width: 768px) {
  .upload-row { flex-direction: column; }
  .upload-label { width: 100%; justify-content: center; }
  .toolbar { flex-direction: column; }
  .search-inp { max-width: 100%; width: 100%; }
  table { font-size: 12px; }
  thead { display: none; }
  tbody tr.course-row { display: grid; grid-template-columns: 32px 1fr 1fr; border-bottom: 2px solid var(--border); padding: 4px 0; }
  tbody tr.course-row td { border: none; padding: 4px 6px; }
  tbody tr.course-row td:nth-child(1) { grid-row: 1/3; align-self: center; }
  tbody tr.course-row td:nth-child(4)::before { content: '개강: '; color: #64748b; font-size: 10px; }
  tbody tr.course-row td:nth-child(5)::before { content: '종강: '; color: #64748b; font-size: 10px; }
  tbody tr.course-row td:nth-child(6)::before { content: '⏰ '; }
  tbody tr.course-row td:nth-child(7)::before { content: '🏫 '; }
  tbody tr.course-row td:nth-child(8)::before { content: '📅 '; }
  .month-header-row td { font-size: 15px !important; padding: 14px 12px !important; }
  .del-btn { padding: 4px 8px; font-size: 11px; }
}

button, .month-header-row, [onclick] { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// Firebase 모듈 래퍼
window.firebaseAppModule = { initializeApp: (cfg) => firebase.initializeApp(cfg) };
window.firebaseDatabaseModule = {
  getDatabase: (app) => firebase.database(app || undefined),
  ref:    (db, path) => db.ref(path),
  onValue:(ref, cb, opts) => opts && opts.onlyOnce ? ref.once('value').then(snap=>cb(snap)) : ref.on('value', cb),
  set:    (ref, val) => ref.set(val),
  get:    (ref) => ref.once('value'),
  remove: (ref) => ref.remove(),
  push:   (ref, val) => ref.push(val)
};
window._firebaseLoaded = true;
</script>
<script>
window.onerror = function(msg) {
  if (!msg) return true;
  const m = String(msg).toLowerCase();
  if (m.includes('script error') || m.includes('unsafe') || m.includes('cross-origin')) return true;
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
  if (!msg || msg.toLowerCase().includes('script error') || msg.toLowerCase().includes('load fail')) {
    e.preventDefault();
  }
});
</script>
</head>

  <!-- 툴바 -->
  <div class="toolbar">
    <input class="search-inp" type="text" id="searchInp" placeholder="강좌명 또는 강사명 검색..." oninput="renderTable()">
    <select class="filter-sel" id="timeFilter" onchange="renderTable()">
      <option value="">시간 전체</option>
      <option>10:00</option><option>11:00</option><option>12:00</option>
      <option>13:00</option><option>14:00</option><option>15:00</option>
      <option>16:00</option><option>17:00</option><option>18:00</option>
      <option>19:00</option><option>20:00</option>

    <span class="count-badge" id="countBadge">0개</span>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      <button id="bulkDelBtn" style="display:none;padding:6px 14px;border-radius:8px;border:1px solid var(--red);color:var(--red);background:var(--red-dim);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">🗑 선택 삭제</button>

      <thead>

<script>
// Firebase SDK는 head의 멀티-CDN 로더가 미리 로드

const firebaseConfig = {
  apiKey: "AIzaSyCyCtQu20qgyCT1uRvmH3bmT1Q1bsT_pUw",
  authDomain: "sbs-academy-game.firebaseapp.com",
  databaseURL: "https://sbs-academy-game-default-rtdb.firebaseio.com",
  projectId: "sbs-academy-game",
  storageBucket: "sbs-academy-game.firebasestorage.app",
  messagingSenderId: "120735998268",
  appId: "1:120735998268:web:9d0d5c778451f69d63fe39"
};

let _app, _db;
// Firebase API 헬퍼 (초기화 전에는 undefined)
let ref, onValue, set, remove, push;

async function initTimetableFirebase() {
  await new Promise((res, rej) => {
    let t=0;
    const iv = setInterval(() => {
      if(window._firebaseLoaded===true){clearInterval(iv);res();}
      if(window._firebaseLoaded===false){clearInterval(iv);rej(new Error('FB 로드 실패'));}
      if((t+=100)>=10000){clearInterval(iv);rej(new Error('타임아웃'));}
    },100);
  });
  // 중복 초기화 방지
  _app = (firebase.apps && firebase.apps.length) ? firebase.apps[0] : window.firebaseAppModule.initializeApp(firebaseConfig);
  _db  = window.firebaseDatabaseModule.getDatabase(_app);
  const m = window.firebaseDatabaseModule;
  // 헬퍼 함수 설정 (path 문자열을 받는 방식)
  ref     = (path) => m.ref(_db, path);
  onValue = (ref, cb, opts) => m.onValue(ref, cb, opts);
  set     = (ref, val) => m.set(ref, val);
  remove  = (ref) => m.remove(ref);
  push    = (ref, val) => m.push(ref, val);
}

// 강의실 단순화: A-1-1 → A, I-1(그래픽)-1 → I(그래픽)
function simplifyRoom(room) {
  if (!room) return '';
  const m = room.match(/^([A-Z]+)-\d+(\([^)]+\))?/);
  return m ? m[1] + (m[2] || '') : room;
}


// 요일 정규화 함수
function normalizeDays(raw) {
  if (!raw) return '';
  const ORDER = '월화수목금토일';
  // 범위 패턴 (월~금 → 월화수목금)
  const rangeM = raw.trim().match(/^([월화수목금토일])~([월화수목금토일])$/);
  if (rangeM) {
    const s = ORDER.indexOf(rangeM[1]);
    const e = ORDER.indexOf(rangeM[2]);
    return ORDER.slice(s, e+1);
  }
  // 중복 제거 후 월화수목금 순서로 정렬
  const seen = new Set([...raw].filter(c => ORDER.includes(c)));
  return [...ORDER].filter(d => seen.has(d)).join('');
}

// 전역 상태
let allCourses = {};
let currentTab = 'all';
let _sortField = 'start';
let _sortAsc = true;

// ════════ Firebase 로드 ════════



// ── 강의실 고정 설정 (강사+강좌+구분 → 강의실) ──
let _roomFix = {}; // key: "강사|강좌|구분" → 강의실

function _sanitizeKey(s) {
  // Firebase 키에 금지된 문자 제거: . # $ / [ ]
  return (s||'').trim().replace(/[.#$\/\[\]]/g, '_');
}
function _roomFixKey(teacher, course, type) {
  return _sanitizeKey(teacher) + '|' + _sanitizeKey(course) + '|' + _sanitizeKey(type);
}

const _DEFAULT_ROOM_FIX = {

  "박솔이|게임원화3H|평일": "F",
  "김보성|언리얼PO|평일": "D",
  "정우일|유니티PO|평일": "D",
  "나주연|게임원화|평일": "E",
  "나주연|게임원화(프)|평일": "E",
  "최해광|아트웍|평일": "F",
  "정우일|유니티게임프로그래머양성과정|평일": "G",
  "황윤솔|웹소설PO|평일": "G",
  "김남영|웹소설2H|평일": "G",
  "김성규|웹소설2H|평일": "G",

  "지바롬|게임기획|평일": "H",

  "이종주|게임기획실무자양성과정|평일": "K",
  "이민수|팀프로젝트|평일": "K",
  "이민수|유니티|평일": "K",
  "조아라|게임원화(격_3h)|평일": "L",
  "박찬주|문예창작|평일": "비대면",

function loadRoomFix() {
  ref('roomFix').on('value', snap => {
    const saved = snap.val();
    if (saved && Object.keys(saved).length > 0) {
      // 키 형식 검증: 강사|강좌|구분 순서인지 확인
      // 올바른 형식이면 강사명이 첫 번째 파트 (한글 2~5자)
      const firstKey = Object.keys(saved)[0];
      const parts = firstKey.split('|');
      const isValidFormat = parts.length === 3 && /^[가-힣]{2,5}$/.test(parts[0]);
      if (isValidFormat) {
        _roomFix = saved;
      } else {
        // 잘못된 형식 → 기본값으로 리셋
        console.log('[roomFix] 키 형식 오류, 기본값으로 리셋');
        _roomFix = Object.assign({}, _DEFAULT_ROOM_FIX);
        set(ref('roomFix'), _roomFix).catch(()=>{});
      }
    } else {
      // Firebase에 없으면 기본값으로 초기화
      _roomFix = Object.assign({}, _DEFAULT_ROOM_FIX);
      set(ref('roomFix'), _roomFix).catch(()=>{});
    }
  });
}

function getFixedRoom(teacher, course, type, parsedRoom) {
  // 정확한 매칭 (sanitize 적용)
  const key = _roomFixKey(teacher, course, type);
  if (_roomFix[key]) return _roomFix[key];
  // 공백+특수문자 제거 후 매칭
  const normCourse  = _sanitizeKey((course||'').replace(/\s+/g,''));
  const normTeacher = _sanitizeKey((teacher||'').trim());
  for (const [k, v] of Object.entries(_roomFix)) {
    const [kt, kc, ktype] = k.split('|');
    if ((kt||'').replace(/\s+/g,'') === normTeacher &&
        (kc||'').replace(/\s+/g,'') === normCourse &&
        (ktype||'') === type) return v;
  }
  return parsedRoom;
}

  row.className = 'rf-row';
  row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 80px 80px 36px;gap:6px;align-items:center;';

    <option value="주말"${val==='주말'?' selected':''}>주말</option>
  </select>`;
  row.innerHTML = inp(teacher,'강사명','rf-teacher') + inp(course,'강좌명','rf-course') + sel(type||'평일') + inp(room,'강의실','rf-room') +

async function saveRoomFix() {
  const rows = document.querySelectorAll('.rf-row');
  const newMap = {};
  rows.forEach(row => {
    const teacher = row.querySelector('.rf-teacher').value.trim();
    const course  = row.querySelector('.rf-course').value.trim();
    const type    = row.querySelector('.rf-type').value;
    const room    = row.querySelector('.rf-room').value.trim().toUpperCase();
    if (teacher && room) {
      newMap[_roomFixKey(teacher, course, type)] = room;
    }
  });
  try {
    await set(ref('roomFix'), newMap);
    _roomFix = newMap;
    closeRoomFixModal();
    showToast('✅ 강의실 고정 설정 저장 완료 (' + Object.keys(newMap).length + '개)');
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message);
  }
}

    var av = (a[_sortField]||'').toLowerCase();

    if (av > bv) return _sortAsc ? 1 : -1;

// ════════ 격일반 xlsx 업로드 ════════
window.uploadGkyilTimetable = async function(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (typeof XLSX === 'undefined') {
    showToast('⚠ SheetJS 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }

  showLoading(true);

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      // cellDates:true + raw:true → Date 객체로 날짜 수신
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, cellDates: true });

      // SheetJS 기준 (빈 1행 제거됨):
      // index 0 (엑셀 2행): 강의실명 + 강사명(XXXT)
      // index 1 (엑셀 3행): 패턴 (월수금월수, 화목화목금 등)
      // index 3~ : 날짜 데이터 (개강 마커 행 + 날짜 행 반복)
      const headerRow  = rows[0] || [];
      const patternRow = rows[1] || [];

      // 강사 컬럼 매핑: 'XXXT' 형태
      const teacherCols = {};
      headerRow.forEach(function(v, i) {
        if (v && typeof v === 'string') {
          const m = v.trim().match(/^([가-힣]{2,5})T$/);
          if (m) teacherCols[i] = m[1];
        }
      });

      if (Object.keys(teacherCols).length === 0) {
        showToast('❌ 강사명을 찾을 수 없습니다. 파일 형식을 확인해주세요.');
        showLoading(false);
        event.target.value = '';
        return;
      }

      // 강의실 매핑: 강사 컬럼 기준 왼쪽에서 강의실명 찾기
      const roomCols = {};
      Object.keys(teacherCols).forEach(function(col) {
        const colIdx = parseInt(col);
        for (let offset = 1; offset <= 3; offset++) {
          const leftIdx = colIdx - offset;
          if (leftIdx < 0) break;
          const v = headerRow[leftIdx];
          if (v && typeof v === 'string' && (v.includes('강의장') || v.includes('비대면'))) {
            const m = v.trim().match(/^([A-Z가-힣]+)/);
            roomCols[col] = m ? m[1] : '';
            break;
          }
        }
      });

      // Date 객체 → 'yyyy-mm-dd' 변환
      function fmtDate(v) {
        if (!v) return null;
        if (v instanceof Date) {
          const y = v.getFullYear();
          const mo = String(v.getMonth() + 1).padStart(2, '0');
          const d  = String(v.getDate()).padStart(2, '0');
          return y + '-' + mo + '-' + d;
        }
        if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0, 10);
        return null;
      }

      // ── 핵심: 강사별로 파일 전체 날짜를 하나의 강좌로 수집 ──
      // 개강 마커 행은 건너뛰고 Date 값만 수집
      const teacherDates = {};
      Object.keys(teacherCols).forEach(function(col) { teacherDates[col] = []; });

      for (let ri = 3; ri < rows.length; ri++) {
        const row = rows[ri] || [];
        // col0이 '개강' 포함 문자열이면 월 구분 마커 행 → 건너뜀
        const col0 = row[0];
        if (col0 && typeof col0 === 'string' && col0.includes('개강')) continue;
        // 모든 강사 컬럼에서 날짜 수집
        Object.keys(teacherCols).forEach(function(col) {
          const colIdx = parseInt(col);
          const ds = fmtDate(row[colIdx]);
          if (ds) teacherDates[col].push(ds);
        });
        // 날짜가 하나도 없는 빈 행이 3행 이상 연속되면 데이터 끝
        const anyDate = Object.keys(teacherCols).some(function(col) {
          return fmtDate((rows[ri] || [])[parseInt(col)]);
        });
        if (!anyDate) {
          // 빈 행 카운트 (연속 3행 비면 종료)
          let emptyCount = 0;
          for (let k = ri; k < Math.min(ri + 3, rows.length); k++) {
            const hasAny = Object.keys(teacherCols).some(function(col) {
              return fmtDate((rows[k] || [])[parseInt(col)]);
            });
            if (!hasAny) emptyCount++;
          }
          if (emptyCount >= 3) break;
        }
      }

      let added = 0, skipped = 0;

      for (const col in teacherCols) {
        const teacher  = teacherCols[col];
        const dates    = teacherDates[col];
        if (!dates.length) continue;

        const startDate = dates[0];
        const endDate   = dates[dates.length - 1];
        const pat = typeof patternRow[parseInt(col)] === 'string'
          ? patternRow[parseInt(col)].trim() : '';

        // 요일 정규화
        let days = '';
        if (pat.includes('월수금')) days = '월수금';
        else if (pat.includes('화목')) days = '화목금';

        const room = roomCols[col] || '';

        // 중복 체크: 강사+개강일 동일하면 스킵
        const exists = Object.values(allCourses).some(function(c) {
          return c.teacher === teacher && c.start === startDate;
        });
        if (exists) { skipped++; continue; }

        try {
          const newRef = push(ref('timetable'));
          await set(newRef, {
            name:    '게임원화(격)',
            teacher: teacher,
            start:   startDate,
            end:     endDate,
            time:    '',
            room:    room,
            days:    days,
            type:    '평일',
            dates:   dates
          });
          added++;
        } catch(err) {
          console.error('저장 실패:', teacher, err);
        }
      }

      showLoading(false);
      event.target.value = '';
      showToast('✅ ' + added + '개 추가 (' + skipped + '개 중복 스킵)');
    } catch(err) {
      showLoading(false);
      event.target.value = '';
      showToast('❌ 오류: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
};


// 중복 강좌 자동 감지 및 삭제
// 기준: 강사 + 개강일 + 시간 + 종강일 동일하면 중복
window.removeDuplicateCourses = async function() {
  const courses = Object.entries(allCourses);
  if (!courses.length) { showToast('시간표 데이터가 없습니다'); return; }

  // 중복 그룹핑: 강사+개강일+종강일+시간 기준
  const groups = {};
  courses.forEach(([key, c]) => {
    const groupKey = (c.teacher||'_') + '|' + (c.start||'') + '|' + (c.end||'') + '|' + (c.time||'');
    if (!groups[groupKey]) groups[groupKey] = [];
    groups[groupKey].push({ key, c });
  });

  // 중복된 그룹만 추출 (2개 이상)
  const dupGroups = Object.entries(groups).filter(([, items]) => items.length > 1);

  if (!dupGroups.length) {
    showToast('중복 강좌가 없습니다');
    return;
  }

  const totalDup = dupGroups.reduce(function(sum, entry) { return sum + entry[1].length - 1; }, 0);
  const previewLines = dupGroups.slice(0, 5).map(function(entry) {
    const c = entry[1][0].c;
    return '- ' + (c.name||'?') + ' / ' + (c.teacher||'강사없음') + ' / ' + (c.start||'?') + ' (' + entry[1].length + '개)';
  });
  const moreText = dupGroups.length > 5 ? ('외 ' + (dupGroups.length - 5) + '건 더') : '';
  const confirmMsg = '중복 강좌 ' + totalDup + '개를 삭제합니다.\n각 그룹에서 1개만 남기고 나머지를 삭제합니다.\n\n'
    + previewLines.join('\n') + (moreText ? '\n' + moreText : '') + '\n\n계속하시겠습니까?';

  if (!confirm(confirmMsg)) return;

  showLoading(true);
  let deleted = 0;
  for (let gi = 0; gi < dupGroups.length; gi++) {
    const items = dupGroups[gi][1];
    // dates 필드 있는 것 우선 보존, 나머지 삭제
    items.sort(function(a, b) { return (b.c.dates ? 1 : 0) - (a.c.dates ? 1 : 0); });
    for (let i = 1; i < items.length; i++) {
      try {
        await remove(ref('timetable/' + items[i].key));
        deleted++;
      } catch(e) { console.error('삭제 실패:', e); }
    }
  }
  showLoading(false);
  showToast('중복 ' + deleted + '개 삭제 완료');
};

// ════════ XLS 업로드 파싱 ════════
window.uploadTimetable = async function(event, scheduleType) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading(true);

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const text = e.target.result;
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      const table = doc.querySelector('table');
      if (!table) { showToast('❌ 시간표 테이블 없음'); showLoading(false); return; }

      const rows = table.querySelectorAll('tr');
      if (rows.length < 2) { showToast('❌ 데이터 부족'); showLoading(false); return; }

      // rows[1]: 세부 강의실 (th+td 40개, 인덱스 일치)
      // colspan 고려한 컬럼→강의실 매핑
      function buildColMap(rowEl) {
        const map = {}; let col = 0;
        rowEl.querySelectorAll('th, td').forEach(cell => {
          const cs = parseInt(cell.getAttribute('colspan') || '1');
          const t = cell.textContent.replace(/\u00a0/g,' ').trim();
          for (let i = 0; i < cs; i++) map[col + i] = t;
          col += cs;
        });
        return map;
      }
      const colToRoom0 = buildColMap(rows[0]); // 대강의실
      const colToRoom1 = buildColMap(rows[1]); // 세부강의실

      // 요일 변환 함수
      // 격일반 수업일 계산: 개강일부터 패턴에 맞게 10일치 날짜 목록 반환
      function calcGkyilDates(rawDays, startDateStr) {
        if (!startDateStr) return null;
        const d = new Date(startDateStr + 'T00:00:00');
        const dow = d.getDay(); // 0=일,1=월,2=화,3=수,4=목,5=금
        let pattern = null;
        if (rawDays === '월수금월수' || rawDays === '월수금월수금') {
          pattern = [1,3,5]; // 월수금
        } else if (rawDays === '화목화목금' || rawDays === '화목금화목') {
          pattern = [2,4,5]; // 화목금
        }
        if (!pattern) return null;
        const dates = [];
        const cur = new Date(startDateStr + 'T00:00:00');
        // 최대 60일 안에서 10일 수집
        for (let i = 0; i < 60 && dates.length < 10; i++) {
          if (pattern.includes(cur.getDay())) {
            const ds = cur.getFullYear() + '-'
              + String(cur.getMonth()+1).padStart(2,'0') + '-'
              + String(cur.getDate()).padStart(2,'0');
            dates.push(ds);
          }
          cur.setDate(cur.getDate() + 1);
        }
        return dates.length === 10 ? dates : null;
      }

      function normalizeDays(rawDays, startDateStr) {
        const dayMap = {
          '월~금': '월화수목금', '월~목': '월화수목', '화~금': '화수목금',
          '월~수': '월화수', '수~금': '수목금', '화~목': '화수목',
          '월~토': '월화수목금토', '월~일': '월화수목금토일',
          '월/수': '월,수', '화/목': '화,목', '수/금': '수,금',
          '월/금': '월,금', '토/일': '토,일',
          '월화수목금': '월화수목금', '월화수목': '월화수목',
          '화수목금': '화수목금', '수목금토': '수목금토',
          '월수금': '월수금', '수목금': '수목금', '월수목': '월수목',
          '월화수': '월화수', '화수목': '화수목',
          '월수': '월,수', '월화': '월,화', '화목': '화,목',
          '수금': '수,금', '수목': '수,목', '월금': '월,금', '목금': '목,금',
          '토일': '토,일', '토': '토', '일': '일', '금': '금', '목': '목',
          '수': '수', '화': '화', '월': '월'
        };

        if (dayMap[rawDays]) return dayMap[rawDays];

        // 복합 패턴: 개강일 요일 기준으로 계산
        if (!startDateStr) return rawDays;
        const d = new Date(startDateStr);
        const dow = d.getDay(); // 0=일,1=월,2=화,3=수,4=목,5=금,6=토
        const DAYS = ['일','월','화','수','목','금','토'];

        if (rawDays === '월수금월수') {
          // 월에 시작: 1주차 월수금, 이후 월수금
          // 수에 시작: 1주차 수금, 이후 월수금
          // 금에 시작: 1주차 금, 이후 월수금
          if (dow === 1) return '월수금 (1주차 월수금)';
          if (dow === 3) return '월수금 (1주차 수금)';
          if (dow === 5) return '월수금 (1주차 금)';
          return '월수금';
        }
        if (rawDays === '화목화목금') {
          // 화에 시작: 1주차 화목금, 이후 화목금
          // 목에 시작: 1주차 목금, 이후 화목금
          // 금에 시작: 1주차 금, 이후 화목금
          if (dow === 2) return '화목금 (1주차 화목금)';
          if (dow === 4) return '화목금 (1주차 목금)';
          if (dow === 5) return '화목금 (1주차 금)';
          return '화목금';
        }
        if (rawDays === '월수금월수금') {
          return '월수금';
        }

        return rawDays;
      }

      const DAY_PATS = [
        '월수금월수금','월수금월수','화목화목금','화목금화목',
        '월화수목금','월화수목','화수목금','수목금토',
        '월~금','월~목','화~금','월~수','수~금','화~목','월~토','월~일',
        '월수금','수목금','월수목','월화수','화수목',
        '월/수','화/목','수/금','월/금','토/일',
        '월수','월화','화목','수금','수목','월금','목금','토일',
        '토','일','금','목','수','화','월'
      ];

      function extractLines(cellEl) {
        const lis = cellEl.querySelectorAll('li');
        if (lis.length > 0) {
          return Array.from(lis).map(li => li.textContent.replace(/\u00a0/g,' ').trim()).filter(Boolean);
        }
        return [];
      }

      let added = 0, skipped = 0;
      const seen = new Set();

      for (let rowIdx = 0; rowIdx < rows.length; rowIdx++) {
        // 행 전체 셀 (th+td) - 인덱스가 subRooms와 일치
        // colspan 기반 컬럼 위치 계산
        const rowCells = rows[rowIdx].querySelectorAll('th, td');
        if (!rowCells.length) continue;

        const firstText = (rowCells[0].textContent || '').replace(/\u00a0/g,' ').trim();
        const timeMatch = firstText.match(/^(\d{2}:\d{2})/);
        const rowTime = timeMatch ? timeMatch[1] : '';

        // 각 셀의 실제 컬럼 위치 (colspan 반영)
        const rowColMap = [];
        let colPos = 0;
        rowCells.forEach(cell => {
          const cs = parseInt(cell.getAttribute('colspan') || '1');
          rowColMap.push({cell, col: colPos, cs});
          colPos += cs;
        });

        const tds = rows[rowIdx].querySelectorAll('td');
        for (let colIdx = 0; colIdx < tds.length; colIdx++) {
          const lines = extractLines(tds[colIdx]);
          if (!lines.length) continue;
          const flat = lines.join('');
          if (!flat.includes('개:') || !flat.includes('종:')) continue;

          // 강좌명 정규화: (국1) 제거, 숫자 제거 (웹툰1(주말)→웹툰(주말), 유니티(주말)5→유니티(주말))
          const courseName = lines[0].trim()
            .replace(/^\([가-힣a-zA-Z]+\d+\)\s*/, '') // 앞 (국1) 제거
            .replace(/\d+([（(])/g, '$1')              // 앞 숫자: 웹툰1( → 웹툰(
            .replace(/([)）])\d+$/g, '$1')             // 뒤 숫자: (주말)2 → (주말)
            .replace(/\d+$/, '').trim();              // 끝 숫자 제거
          if (!courseName || courseName.length < 2) continue;

          const startM = flat.match(/개:(\d{4}-\d{2}-\d{2})/);
          const endM   = flat.match(/종:(\d{4}-\d{2}-\d{2})/);
          if (!startM) continue;
          const startDate = startM[1];
          const endDate   = endM ? endM[1] : '';


          // 강사/요일 파싱
          const baejungIdx = lines.findIndex(l => /^배정\s*:/.test(l));
          let teacher = '', rawDays = '';
          if (baejungIdx >= 0) {
            const afterLines = lines.slice(baejungIdx + 1);
            const beforeEnd = [];
            for (const line of afterLines) {
              if (/^개\s*:/.test(line) || /^종\s*:/.test(line)) break;
              beforeEnd.push(line);
            }
            for (const line of beforeEnd) {
              if (DAY_PATS.includes(line)) { rawDays = line; break; }
            }
            const dayIdx = beforeEnd.findIndex(l => l === rawDays);
            const beforeDay = dayIdx >= 0 ? beforeEnd.slice(0, dayIdx) : beforeEnd;
            for (let i = beforeDay.length - 1; i >= 0; i--) {
              const cleaned = beforeDay[i].replace(/\d+$/, '').trim();
              if (/^[가-힣]{2,5}$/.test(cleaned)) { teacher = cleaned; break; }
            }
          }

          // 비대면: 강사명 못 찾으면 정원 라인에서 XXX T 패턴 추출
          // 예) (게임-부산)장덕윤T → 장덕윤
          // 비대면: 강사명 못 찾으면 XXXT/t 패턴으로 추출
          // 예) (게임-부산)박준석T → 박준석, 노광필t → 노광필
          if (!teacher) {
            for (const line of lines) {
              const mT = line.match(/([가-힣]{2,5})[Tt][^가-힣]/);
              const mT2 = !mT && line.match(/([가-힣]{2,5})[Tt]$/);
              const matched = mT || mT2;
              if (matched) { teacher = matched[1].trim(); break; }
            }
          }

          // 강의실: td의 실제 컬럼 위치로 매핑
          const tdColEntry = rowColMap.find(e => e.cell === tds[colIdx]);
          const tdCol = tdColEntry ? tdColEntry.col : -1;
          const rawRoom = tdCol >= 0 ? (colToRoom1[tdCol] || colToRoom0[tdCol] || '') : '';
          const roomMatch = rawRoom.match(/^([A-Z]+)/);
          const parsedRoom = roomMatch ? roomMatch[1] : rawRoom;
          // 강의실 고정 설정 적용 (강사+강좌+구분 매핑)
          const room = getFixedRoom(teacher, courseName, scheduleType, parsedRoom);

          // 중복 체크: 같은 파일 내 + Firebase 기존 데이터 모두 비교
          // 강사+개강일+종강일+시간+강의실(rawRoom) 기준
          const key = (teacher||'_') + '|' + startDate + '|' + endDate + '|' + rowTime + '|' + rawRoom;
          if (seen.has(key)) { skipped++; continue; }
          // Firebase 기존 데이터와 비교 (강사+개강일+시간 기준 — rawRoom 무관)
          const fbDupKey = (teacher||'_') + '|' + startDate + '|' + rowTime;
          const fbExists = Object.values(allCourses).some(c =>
            ((c.teacher||'_') + '|' + (c.start||'') + '|' + (c.time||'')) === fbDupKey
            && (c.end||'') === endDate
          );
          if (fbExists) { skipped++; continue; }
          seen.add(key);

          // 요일 정규화
          const days = normalizeDays(rawDays, startDate);

          try {
            const newRef = push(ref('timetable'));
            // 격일반이면 실제 수업일 10개 계산해서 dates 필드 저장
            const gkyilDates = calcGkyilDates(rawDays, startDate);
            const courseData = { name: courseName, teacher, start: startDate, end: endDate,
              time: rowTime, room, days, type: scheduleType };
            if (gkyilDates) courseData.dates = gkyilDates;
            await set(newRef, courseData);
            added++;
          } catch(pushErr) {
            console.error('push 실패:', pushErr);
          }
        }
      }

      showLoading(false);
      event.target.value = '';
      showToast('✅ ' + added + '개 추가 (' + skipped + '개 중복 스킵)');
    } catch(err) {
      showLoading(false);
      showToast('❌ 오류: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file, 'utf-8');
};;;;

document.getElementById('seedBtn').addEventListener('click', seedTimetable);

async function seedTimetable() {
  if (!confirm('현재 파싱된 강좌 데이터를 Firebase에 올릴까요?\n(이미 있는 항목은 스킵됩니다)')) return;
  showLoading(true);
  let added = 0, skipped = 0;
  for (const course of INITIAL_TIMETABLE) {
    const existing = Object.values(allCourses);
    const isDup = existing.some(ex => ex.name === course.name && ex.teacher === course.teacher && ex.start === course.start && ex.time === course.time);
    if (isDup) { skipped++; continue; }
    const newRef = push(ref('timetable'));
    await set(newRef, course);
    added++;
  }
  showLoading(false);
  showToast(`✅ ${added}개 추가 (${skipped}개 중복 스킵)`);
};

// ════════ 버튼 이벤트 연결 ════════
document.getElementById('addRowBtn').addEventListener('click', () => window.addNewRow());
document.getElementById('bulkDelBtn').addEventListener('click', bulkDelete);
document.getElementById('ttChkAll').addEventListener('change', function() {
  document.querySelectorAll('.tt-chk').forEach(cb => { cb.checked = this.checked; });
  updateBulkDel();
});

function updateBulkDel() {
  const checked = document.querySelectorAll('.tt-chk:checked').length;
  const btn = document.getElementById('bulkDelBtn');
  btn.style.display = checked > 0 ? 'block' : 'none';
  btn.textContent = `🗑 ${checked}개 삭제`;
}

async function bulkDelete() {
  const checked = document.querySelectorAll('.tt-chk:checked');
  if (!checked.length) return;
  if (!confirm(`선택한 ${checked.length}개 강좌를 삭제하시겠습니까?`)) return;
  for (const cb of checked) {
    await remove(ref(`timetable/${cb.dataset.key}`));
  }
  document.getElementById('ttChkAll').checked = false;
  showToast(`🗑 ${checked.length}개 삭제 완료`);
}

window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};</script>
